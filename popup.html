<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube RAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --red: #ff2b4e;
      --red-dim: rgba(255, 43, 78, 0.12);
      --red-glow: rgba(255, 43, 78, 0.3);
      --text: #e8e8f0;
      --text-dim: #6b6b80;
      --text-muted: #3d3d50;
      --accent: #7c5cff;
      --accent-dim: rgba(124, 92, 255, 0.15);
      --user-bubble: #1e1e30;
      --ai-bubble: #13131a;
      --success: #2dff8c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      height: 580px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      position: relative;
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--red);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--red-glow);
    }

    .logo svg { width: 14px; height: 14px; fill: white; }

    .header-text { flex: 1; min-width: 0; }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .video-label {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.ready { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.loading { background: var(--red); box-shadow: 0 0 6px var(--red-glow); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── API Key section ── */
    .api-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-input:focus { border-color: var(--accent); }
    .api-input::placeholder { color: var(--text-muted); }

    .save-btn {
      padding: 6px 12px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .save-btn:hover { background: rgba(124, 92, 255, 0.25); }

    /* ── Load section ── */
    .load-section {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .load-row { display: flex; gap: 8px; align-items: center; }

    .video-id-display {
      flex: 1;
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .load-btn {
      padding: 7px 14px;
      background: var(--red);
      border: none;
      border-radius: 6px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 10px var(--red-glow);
    }
    .load-btn:hover:not(:disabled) { box-shadow: 0 0 18px var(--red-glow); }
    .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-msg {
      margin-top: 6px;
      font-size: 10px;
      color: var(--red);
      min-height: 14px;
      font-style: italic;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .icon { font-size: 28px; }
    .empty-state p { font-size: 11px; line-height: 1.6; max-width: 220px; }

    /* Suggestion chips */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .chip {
      padding: 5px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .chip:hover { border-color: var(--red); color: var(--text); }

    /* Messages */
    .message {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-items: flex-end; }
    .message.ai   { align-items: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 9px 12px;
      border-radius: 10px;
      line-height: 1.6;
      font-size: 12px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-bottom-right-radius: 3px;
      color: var(--text);
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }

    .bubble.error { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    .sender {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span {
      width: 5px; height: 5px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      background: var(--surface);
    }

    .question-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      resize: none;
      outline: none;
      height: 38px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    .question-input:focus { border-color: var(--red); }
    .question-input::placeholder { color: var(--text-muted); }
    .question-input:disabled { opacity: 0.4; }

    .send-btn {
      width: 38px; height: 38px;
      background: var(--red);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--red-glow);
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    .send-btn:hover:not(:disabled) { box-shadow: 0 0 16px var(--red-glow); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; fill: white; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
  </div>
  <div class="header-text">
    <div class="header-title">YT RAG CHAT</div>
    <div class="video-label" id="videoLabel">No video detected</div>
  </div>
  <div class="status-dot" id="statusDot" title="Not ready"></div>
</div>

<!-- API Key -->
<div class="api-section">
  <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-… OpenAI API key" autocomplete="off" />
  <button class="save-btn" id="saveApiBtn">Save</button>
</div>

<!-- Load video -->
<div class="load-section">
  <div class="load-row">
    <div class="video-id-display" id="videoIdDisplay">Open a YouTube video to begin</div>
    <button class="load-btn" id="loadBtn" disabled>LOAD VIDEO</button>
  </div>
  <div class="progress-msg" id="progressMsg"></div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">🎬</div>
    <p>Load a YouTube video above, then ask anything about it.</p>
    <div class="suggestions" id="suggestions" style="display:none">
      <div class="chip" data-q="Summarize this video in 3 bullet points">Summarize</div>
      <div class="chip" data-q="What are the main topics discussed?">Main topics</div>
      <div class="chip" data-q="What are the key takeaways from this video?">Key takeaways</div>
      <div class="chip" data-q="Are there any timestamps or chapters mentioned?">Chapters</div>
    </div>
  </div>
</div>

<!-- Input bar -->
<div class="input-bar">
  <textarea class="question-input" id="questionInput" placeholder="Ask about the video…" rows="1" disabled></textarea>
  <button class="send-btn" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script src="popup.js"></script>
</body>
</html>
